name: Build APK (All Types)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipe Build'
        required: true
        type: choice
        options:
          - website
          - zip_flutter
          - zip_android
      url:
        description: 'URL Website (jika website)'
        required: false
        type: string
      zip_url:
        description: 'URL ZIP (jika zip)'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_base64:
        description: 'Icon Base64 (optional)'
        required: false
        type: string
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Flutter
        if: contains(github.event.inputs.build_type, 'flutter')
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Build from Website
        if: github.event.inputs.build_type == 'website'
        run: |
          npm install -g cordova
          PACKAGE_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g')
          cordova create app com.kenzmd.${PACKAGE_NAME} "${{ github.event.inputs.app_name }}"
          cd app
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          
          cat > config.xml << EOF
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.kenzmd.${PACKAGE_NAME}" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>${{ github.event.inputs.app_name }}</name>
              <content src="${{ github.event.inputs.url }}" />
              <access origin="*" />
              <preference name="Orientation" value="default" />
          </widget>
          EOF
          
          if [ -n "${{ github.event.inputs.icon_base64 }}" ]; then
            echo "${{ github.event.inputs.icon_base64 }}" | base64 -d > icon.png
            mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
            cp icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          fi
          
          cordova build android --release -- --package-type=apk
          APK_PATH="platforms/android/app/build/outputs/apk/release/app-release.apk"
      
      - name: Build from ZIP (Flutter)
        if: github.event.inputs.build_type == 'zip_flutter'
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          unzip project.zip -d project/
          cd project/
          flutter clean
          flutter pub get
          flutter build apk --release
          APK_PATH=$(find . -name "*.apk" | head -n 1)
      
      - name: Build from ZIP (Android)
        if: github.event.inputs.build_type == 'zip_android'
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          unzip project.zip -d project/
          cd project/
          chmod +x gradlew
          ./gradlew assembleRelease
          APK_PATH=$(find . -name "*.apk" | head -n 1)
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}.apk
          path: ${{ env.APK_PATH }}
          retention-days: 7
