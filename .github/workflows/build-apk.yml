name: Build APK Real

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Nama Proyek / APK'
        required: true
        type: string
      project_type:
        description: 'Tipe Proyek'
        required: true
        type: choice
        options:
          - flutter
          - android_native
          - webview
      repo_url:
        description: 'URL GitHub Repository (untuk Flutter/Android Native)'
        required: false
        type: string
      web_url:
        description: 'URL Website (untuk WebView)'
        required: false
        type: string
      user_id:
        description: 'Telegram User ID (untuk notifikasi)'
        required: true
        type: string

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node.js (untuk WebView)
        if: github.event.inputs.project_type == 'webview'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Flutter (untuk Flutter)
        if: github.event.inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
      
      - name: Setup Cordova (untuk WebView)
        if: github.event.inputs.project_type == 'webview'
        run: npm install -g cordova
      
      - name: Clone Repository (Flutter/Android Native)
        if: github.event.inputs.project_type != 'webview'
        run: |
          git clone ${{ github.event.inputs.repo_url }} project
          cd project
          ls -la
      
      - name: Build WebView APK
        if: github.event.inputs.project_type == 'webview'
        run: |
          mkdir -p webview_build
          cd webview_build
          cordova create app com.example.app "${{ github.event.inputs.project_name }}"
          cd app
          cordova platform add android
          # Buat file index.html yang redirect ke URL target
          cat > www/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=${{ github.event.inputs.web_url }}">
            <style>
              body { margin: 0; padding: 0; overflow: hidden; }
              iframe { width: 100vw; height: 100vh; border: none; }
            </style>
          </head>
          <body>
            <iframe src="${{ github.event.inputs.web_url }}"></iframe>
          </body>
          </html>
          EOF
          cordova build android --release
          cp platforms/android/app/build/outputs/apk/release/app-release.apk ../../app-release.apk
      
      - name: Build Flutter APK
        if: github.event.inputs.project_type == 'flutter'
        run: |
          cd project
          flutter clean
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk
      
      - name: Build Android Native APK
        if: github.event.inputs.project_type == 'android_native'
        run: |
          cd project
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
          cp app/build/outputs/apk/release/*.apk ../app-release.apk
      
      - name: Rename APK
        run: |
          PROJECT_NAME="${{ github.event.inputs.project_name }}"
          PROJECT_NAME_CLEAN=$(echo "$PROJECT_NAME" | sed 's/[^a-zA-Z0-9]/_/g')
          mv app-release.apk "${PROJECT_NAME_CLEAN}.apk" 2>/dev/null || echo "APK sudah bernama sesuai"
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-apk
          path: "*.apk"
          retention-days: 7
      
      - name: Kirim Notifikasi ke Telegram (Success)
        if: success()
        run: |
          APK_NAME=$(ls *.apk 2>/dev/null | head -1)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${{ github.event.inputs.user_id }}" \
            -d parse_mode="Markdown" \
            -d text="✅ *Build BERHASIL!*%0A%0A📦 Proyek: ${{ github.event.inputs.project_name }}%0A📱 Tipe: ${{ github.event.inputs.project_type }}%0A%0A📥 *Download APK:*%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
      - name: Kirim Notifikasi ke Telegram (Failed)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${{ github.event.inputs.user_id }}" \
            -d parse_mode="Markdown" \
            -d text="❌ *Build GAGAL!*%0A%0A📦 Proyek: ${{ github.event.inputs.project_name }}%0A📱 Tipe: ${{ github.event.inputs.project_type }}%0A%0ASilakan cek log di GitHub Actions."    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node.js
        if: github.event.inputs.project_type == 'webview'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Flutter
        if: github.event.inputs.project_type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
      
      - name: Clone Repository (Flutter/Android)
        if: github.event.inputs.project_type != 'webview'
        run: |
          git clone ${{ github.event.inputs.repo_url }} project
          cd project
      
      - name: Build WebView APK
        if: github.event.inputs.project_type == 'webview'
        run: |
          mkdir -p webview_project
          cd webview_project
          npm init -y
          npm install cordova
          npx cordova create app com.example.app "${{ github.event.inputs.project_name }}"
          cd app
          npx cordova platform add android
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=${{ github.event.inputs.web_url }}"></head></html>' > www/index.html
          npx cordova build android --release
          cp platforms/android/app/build/outputs/apk/release/app-release.apk ../../app-release.apk
      
      - name: Build Flutter APK
        if: github.event.inputs.project_type == 'flutter'
        run: |
          cd project
          flutter clean
          flutter pub get
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk
      
      - name: Build Android Native APK
        if: github.event.inputs.project_type == 'android'
        run: |
          cd project
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
          cp app/build/outputs/apk/release/*.apk ../app-release.apk
      
      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.project_name }}-apk
          path: app-release.apk
          retention-days: 7
      
      - name: Send to Telegram (Success)
        if: success()
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ✅ *Build Selesai!*
            
            📦 Proyek: ${{ github.event.inputs.project_name }}
            👤 User: ${{ github.event.inputs.user_name }}
            
            📱 Download APK:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Send to Telegram (Failed)
        if: failure()
        uses: cbrgm/telegram-github-action@v1
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            ❌ *Build GAGAL!*
            
            📦 Proyek: ${{ github.event.inputs.project_name }}
            👤 User: ${{ github.event.inputs.user_name }}
            
            Silakan cek log di GitHub Actions.
