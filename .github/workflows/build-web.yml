name: Build APK from Website

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL Website'
        required: true
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      icon_base64:
        description: 'Icon Base64 (optional)'
        required: false
        type: string
      chat_id:
        description: 'Telegram Chat ID'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install Cordova
        run: npm install -g cordova
      
      - name: Create Cordova Project
        run: |
          PACKAGE_NAME=$(echo "${{ github.event.inputs.app_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/_/g')
          cordova create app com.kenzmd.${PACKAGE_NAME} "${{ github.event.inputs.app_name }}"
          cd app
          cordova platform add android
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-whitelist
      
      - name: Configure config.xml
        run: |
          cd app
          cat > config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.kenzmd.${{ github.event.inputs.app_name }}" 
                  version="1.0.0" 
                  xmlns="http://www.w3.org/ns/widgets" 
                  xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>${{ github.event.inputs.app_name }}</name>
              <description>Built by Kenzmd Web2APK Bot</description>
              <author email="kenzmd@tanz.ai" href="https://t.me/KENZZBJIR">Kenzmd</author>
              <content src="${{ github.event.inputs.url }}" />
              <access origin="*" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <allow-intent href="tel:*" />
              <allow-intent href="sms:*" />
              <allow-intent href="mailto:*" />
              <allow-intent href="geo:*" />
              <preference name="Orientation" value="default" />
              <preference name="Fullscreen" value="false" />
              <preference name="StatusBarOverlaysWebView" value="false" />
              <preference name="StatusBarBackgroundColor" value="#000000" />
          </widget>
          EOF
      
      - name: Add Icon
        if: github.event.inputs.icon_base64 != ''
        run: |
          cd app
          echo "${{ github.event.inputs.icon_base64 }}" | base64 -d > icon.png
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      
      - name: Add Default Icon
        if: github.event.inputs.icon_base64 == ''
        run: |
          cd app
          echo "" | base64 -d > icon.png
          mkdir -p platforms/android/app/src/main/res/mipmap-hdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-mdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxhdpi
          mkdir -p platforms/android/app/src/main/res/mipmap-xxxhdpi
          cp icon.png platforms/android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon.png platforms/android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
      
      - name: Build APK Release
        run: |
          cd app
          cordova build android --release -- --package-type=apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}.apk
          path: app/platforms/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
      
      - name: Send to Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ github.event.inputs.chat_id }}
          token: ${{ secrets.BOT_TOKEN }}
          message: |
            ✅ BUILD WEBSITE BERHASIL!
            
            📱 Nama: ${{ github.event.inputs.app_name }}
            🌐 URL: ${{ github.event.inputs.url }}
            📦 Ukuran: ~70 MB
            
            🔗 Download: APK akan diupload otomatis oleh bot
